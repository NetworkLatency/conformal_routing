# Smoke-test config: local DeepSeek-R1-Distill-Qwen-1.5B SLM + remote Qwen3-14B LLM.
#
# Edit api_base_url and local tokenizer/model paths before running on the server.

run_name: math_remote_qwen3

runtime:
  model_backend: vllm
  offline: true

output_dirs:
  preliminary: outputs/preliminary
  calibrators: outputs/calibrators
  inference: outputs/inference
  diagnostics: outputs/diagnostics

benchmark: math500
limit: 20
max_steps: 16
step_delimiters: ["\n\n"]
# Use the remote Qwen3-14B answer as a cheap cross-model agreement label.
calibration_strategy: agreement

dataset_paths:
  math500: /home/lhyang/Documents/code/reasoning_boundary/data/math500/MATH500.json

vllm_defaults:
  dtype: bfloat16
  max_model_len: 32768
  tensor_parallel_size: 1
  enable_prefix_caching: true
  seed: 42
  probe_logprobs: 200
  trust_remote_code: true
  offline: true
  require_local_model: true
  use_chat_template: true
  # Match GlimpRouter BPA rendering: do not force a reasoning prefill here.
  # Let the tokenizer/chat_template decide whether the assistant turn starts
  # with <think>.
  assistant_prefix_start: ""
  continue_final_message: true
  add_generation_prompt: true

small_model:
  backend: vllm
  model_name_or_path: /home/lhyang/Documents/code/reasoning_boundary/models/deepseek-aiDeepSeek-R1-Distill-Qwen-1.5B
  tokenizer_name_or_path: null
  n_params_billion: 1.5
  gpu_memory_utilization: 0.30

large_model:
  backend: openai_compatible
  api_base_url: http://192.168.3.13:8080/v1
  api_key: EMPTY
  api_model: Qwen3-14B
  model_name_or_path: Qwen3-14B
  tokenizer_name_or_path: /home/lhyang/Documents/code/reasoning_boundary/models/qwen3-14B/
  n_params_billion: 14.0
  timeout_s: 12000

signals:
  - h_init
  - logit_confidence
  - self_consistency

signal_kwargs:
  h_init: {}
  logit_confidence:
    mode: max_prob
  self_consistency:
    n_samples: 4
    prefix_tokens: 12
    temperature: 0.7
    agreement_metric: first_token_agreement

signal:
  name: logit_confidence
  kwargs:
    mode: max_prob

calibrators:
  - name: conformal
    id: conformal_alpha010
    kwargs: { alpha: 0.10 }

pipeline:
  max_steps: 16
  max_tokens_per_step: 1024
  temperature_small: 0.0
  temperature_large: 0.0
  reuse_probe_first_token: true
  stop_on_repetition: true
  repetition_min_chars: 10
